<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 250px;
      padding: 15px;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #121212;
      color: #ffffff;
      margin: 0;
    }
    .container {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    h2 {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
      color: #ff0000; /* YouTube Red */
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .slider-container {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .label-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      font-weight: 500;
    }
    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 6px;
      background: #333;
      border-radius: 3px;
      outline: none;
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      background: #ff0000;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(255, 0, 0, 0.4);
      transition: transform 0.1s ease;
    }
    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.1);
    }
    .status {
      font-size: 11px;
      color: #888;
      text-align: center;
      margin-top: 5px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
      </svg>
      EarSaver
    </h2>
    <div class="slider-container">
      <div class="label-row">
        <span>Volume General</span>
        <span id="volumeValue">100%</span>
      </div>
      <input type="range" id="volumeSlider" min="0" max="200" value="100">
    </div>
    <div class="status">Normalisation active sur YouTube</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
